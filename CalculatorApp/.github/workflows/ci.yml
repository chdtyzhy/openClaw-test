name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint
    
    - name: Run tests
      run: npm test -- --coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        fail_ci_if_error: true

  build-android:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleRelease
      env:
        ORG_GRADLE_PROJECT_android.useAndroidX: true
        ORG_GRADLE_PROJECT_android.enableJetifier: true

  # iOS构建需要macOS环境，这里只提供配置示例
  # build-ios:
  #   runs-on: macos-latest
  #   needs: test
  #   
  #   steps:
  #   - uses: actions/checkout@v4
  #   
  #   - name: Install dependencies
  #     run: npm ci
  #   
  #   - name: Install CocoaPods dependencies
  #     run: |
  #       cd ios
  #       pod install
  #   
  #   - name: Build iOS
  #     run: |
  #       xcodebuild -workspace ios/CalculatorPro.xcworkspace \
  #                  -scheme CalculatorPro \
  #                  -destination 'generic/platform=iOS' \
  #                  -configuration Release \
  #                  clean build

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build-android]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
    
    - name: Generate changelog
      run: |
        echo "# 版本更新日志" > CHANGELOG.md
        echo "## v${{ github.run_number }}" >> CHANGELOG.md
        echo "- 自动化构建和测试通过" >> CHANGELOG.md
        echo "- 代码质量检查完成" >> CHANGELOG.md
    
    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./CHANGELOG.md
        asset_name: CHANGELOG.md
        asset_content_type: text/markdown